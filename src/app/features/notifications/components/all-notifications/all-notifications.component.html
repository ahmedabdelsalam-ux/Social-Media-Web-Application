<section class="w-[95%] mx-auto mt-6">
  <div class="space-y-3">
    @for (notif of notifications(); track notif._id) {
      <app-notification [notification]="notif" />
    } @empty {
      <div class="flex flex-col items-center justify-center py-16 text-center">
        <div class="w-16 h-16 flex items-center justify-center rounded-full bg-gray-100 mb-4">
          <i class="fa-regular fa-bell-slash text-2xl text-gray-400"></i>
        </div>

        <h3 class="text-lg font-semibold text-gray-700">No Notifications Yet</h3>

        <p class="text-sm text-gray-500 mt-1">
          You're all caught up! We'll notify you when something new arrives.
        </p>
      </div>
    }
  </div>
</section>
