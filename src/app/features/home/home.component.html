<div class="max-w-7xl mx-auto px-4 sm:px-6">
  <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-start">
    <!-- LEFT SIDEBAR (Desktop only) -->
    <div class="hidden lg:block lg:col-span-2 self-start sticky top-20">
      <div class="bg-white rounded-xl shadow p-3 mt-6">
        <ul class="flex flex-col gap-1">
          <li>
            <a
              routerLink="/home/feed"
              routerLinkActive="bg-indigo-50 text-main-color"
              class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 hover:bg-indigo-50 hover:text-main-color"
            >
              <i class="fa-solid fa-newspaper"></i>
              Feed
            </a>
          </li>

          <li>
            <a
              routerLink="/home/my-posts"
              routerLinkActive="bg-indigo-50 text-main-color"
              class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 hover:bg-indigo-50 hover:text-main-color"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="17"
                height="17"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-sparkles"
                aria-hidden="true"
              >
                <path
                  d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"
                ></path>
                <path d="M20 2v4"></path>
                <path d="M22 4h-4"></path>
                <circle cx="4" cy="20" r="2"></circle>
              </svg>
              My Posts
            </a>
          </li>

          <li>
            <a
              routerLink="/home/community"
              routerLinkActive="bg-indigo-50 text-main-color"
              class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 hover:bg-indigo-50 hover:text-main-color"
            >
              <i class="fa-solid fa-earth-africa"></i>
              Community
            </a>
          </li>

          <li>
            <a
              routerLink="/home/saved"
              routerLinkActive="bg-indigo-50 text-main-color"
              class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 hover:bg-indigo-50 hover:text-main-color"
            >
              <i class="fa-regular fa-bookmark"></i>
              Saved
            </a>
          </li>
        </ul>
      </div>
    </div>

    <!-- MIDDLE -->
    <div class="w-full md:col-span-8 lg:col-span-7">
      <!-- Create Post -->
      <section>
        <app-creatpost></app-creatpost>
      </section>

      <!-- Sidebar for Mobile & Tablet -->
      <div class="w-[95%] mx-auto mt-6 lg:hidden">
        <div class="bg-white rounded-xl shadow p-3">
          <ul class="grid grid-cols-2 gap-3">
            <li>
              <a
                routerLink="/home/feed"
                routerLinkActive="bg-indigo-50 text-main-color"
                class="flex items-center gap-2 px-4 py-4 rounded-xl text-sm font-medium text-gray-600 hover:bg-indigo-50 hover:text-main-color"
              >
                <i class="fa-solid fa-newspaper"></i>
                Feed
              </a>
            </li>

            <li>
              <a
                routerLink="/home/my-posts"
                routerLinkActive="bg-indigo-50 text-main-color"
                class="flex items-center gap-2 px-4 py-4 rounded-xl text-sm font-medium text-gray-600 hover:bg-indigo-50 hover:text-main-color"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="17"
                  height="17"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-sparkles"
                  aria-hidden="true"
                >
                  <path
                    d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"
                  ></path>
                  <path d="M20 2v4"></path>
                  <path d="M22 4h-4"></path>
                  <circle cx="4" cy="20" r="2"></circle>
                </svg>
                My Posts
              </a>
            </li>

            <li>
              <a
                routerLink="/home/community"
                routerLinkActive="bg-indigo-50 text-main-color"
                class="flex items-center gap-2 px-4 py-4 rounded-xl text-sm font-medium text-gray-600 hover:bg-indigo-50 hover:text-main-color"
              >
                <i class="fa-solid fa-earth-africa"></i>
                Community
              </a>
            </li>

            <li>
              <a
                routerLink="/home/saved"
                routerLinkActive="bg-indigo-50 text-main-color"
                class="flex items-center gap-2 px-4 py-4 rounded-xl text-sm font-medium text-gray-600 hover:bg-indigo-50 hover:text-main-color"
              >
                <i class="fa-regular fa-bookmark"></i>
                Saved
              </a>
            </li>
          </ul>
        </div>

        <!-- Mobile Suggested Friends Button -->
        <div class="mt-4">
          <button
            routerLink="/suggestfriends"
            class="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl bg-main-color text-white font-medium shadow hover:scale-105 transition"
          >
            <i class="fa-solid fa-users"></i>
            Suggested Friends
          </button>
        </div>
      </div>

      <!-- Posts -->
      <section class="mt-4">
        <router-outlet></router-outlet>
      </section>
    </div>

    <!-- RIGHT: Suggested Friends -->
    <div class="hidden md:block md:col-span-4 lg:col-span-3 self-start sticky top-20">
      <div class="bg-white rounded-xl shadow p-3 mt-6">
        <!-- Header -->
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-sm font-semibold text-gray-800">Suggested Friends</h3>
          <div class="flex items-center gap-1 text-xs text-gray-500">
            <i class="fa-solid fa-users text-main-color"></i>
            <span>5</span>
          </div>
        </div>

        <!-- Friends -->
        @for (friend of AllFrindes().slice(0, 5); track friend._id) {
          <app-frind [friend]="friend" />
        }

        <div class="mt-2 text-center">
          <button
            routerLink="/suggestfriends"
            class="capitalize cursor-pointer px-4 border-2 rounded-3xl p-2 bg-main-color text-white"
          >
            see more freinds <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
