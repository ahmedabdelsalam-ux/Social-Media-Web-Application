<div class="min-h-screen bg-gray-50 py-8 px-4">
  <!-- Back to feed -->
  <div class="max-w-4xl mx-auto mb-4">
    <button
      routerLink="/home/feed"
      class="flex items-center bg-main-color rounded-3xl p-3 gap-2 text-sm text-white hover:text-main-color hover:bg-gray-200 font-bold transition cursor-pointer"
    >
      <i class="fa-solid fa-arrow-left"></i>
      Back to feed
    </button>
  </div>

  <!-- Card -->
  <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow p-6">
    <!-- Header -->
    <div class="flex items-center justify-between mb-5">
      <div class="flex items-center gap-2">
        <i class="fa-solid fa-user-group text-main-color text-lg"></i>
        <h1 class="text-xl font-bold text-gray-800">All Suggested Friends</h1>
      </div>
      <span class="text-xs font-semibold bg-gray-100 text-gray-600 px-3 py-1 rounded-full">
        {{ AllFrindes().length }}
      </span>
    </div>

    <!-- Search -->
    <div class="relative mb-6">
      <i
        class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"
      ></i>
      <input
        type="text"
        placeholder="Search by name or username..."
        (input)="onSearch($event)"
        class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-main-color/30 focus:border-main-color transition"
      />
    </div>

    <!-- Grid -->
    @if (filteredFriends().length > 0) {
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        @for (friend of filteredFriends(); track friend._id) {
          <app-frind [friend]="friend" />
        }
      </div>
    } @else {
      <div class="text-center py-16 text-gray-400">
        <i class="fa-solid fa-user-slash text-3xl mb-3"></i>
        <p class="text-sm">No friends found</p>
      </div>
    }
  </div>
</div>
