<section class="w-[95%] mx-auto mt-6 rounded-2xl p-4 sm:p-6 bg-white shadow-xl">
  <!-- ── User info bar ── -->
  <div class="flex items-center gap-3 mb-4">
    <div class="relative shrink-0">
      <img
        routerLink="/profile"
        [src]="userPhoto()"
        [alt]="userName()"
        class="w-10 h-10 sm:w-11 sm:h-11 rounded-full object-cover ring-2 ring-indigo-500/40 cursor-pointer"
      />
      <span
        class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-400 border-2 border-white rounded-full"
      ></span>
    </div>
    <div class="flex flex-col min-w-0">
      <span
        routerLink="/profile"
        class="text-sm sm:text-base font-semibold text-gray-800 truncate hover:underline cursor-pointer"
        >{{ userName() }}</span
      >
      <span class="text-xs text-gray-400">Public</span>
    </div>
  </div>

  <!-- ── Post Form ── -->
  <form (submit)="submitAddPost($event)">
    <!-- Textarea -->
    <textarea
      [formControl]="creatPostContent"
      id="post-message"
      rows="3"
      class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-2xl focus:ring-2 focus:ring-indigo-400 focus:border-transparent block w-full px-4 py-3 placeholder:text-gray-400 resize-none mb-3 transition-all"
      placeholder="What's on your mind?"
    ></textarea>

    <!-- Image Preview -->
    @if (previewUrl()) {
      <div
        class="relative w-full mb-3 rounded-2xl overflow-hidden border border-gray-200 shadow-sm"
      >
        <img [src]="previewUrl()" class="w-full max-h-56 sm:max-h-72 object-cover" alt="preview" />
        <div
          class="absolute inset-0 bg-linear-to-t from-black/20 to-transparent pointer-events-none"
        ></div>
        <button
          type="button"
          (click)="removeImage()"
          class="absolute top-2 right-2 bg-black/60 hover:bg-black/80 text-white rounded-full w-8 h-8 flex items-center justify-center transition-all shadow-md backdrop-blur-sm"
        >
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24">
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2.5"
              d="M6 18 17.94 6M18 18 6.06 6"
            />
          </svg>
        </button>
      </div>
    }

    <!-- Bottom bar -->
    <div class="flex items-center justify-between border-t border-gray-100 pt-3 gap-2">
      <!-- Left: action buttons -->
      <div class="flex items-center gap-0.5">
        <!-- Image upload button -->
        <label
          for="dropzone-file"
          class="cursor-pointer flex items-center gap-1.5 px-2.5 py-2 sm:px-3 rounded-xl text-gray-500 hover:text-indigo-600 hover:bg-indigo-50 transition-all group"
          title="Upload photo"
        >
          <svg
            class="w-5 h-5 transition-transform group-hover:scale-110"
            fill="none"
            viewBox="0 0 24 24"
          >
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.8"
              d="M3 9a2 2 0 0 1 2-2h.93a2 2 0 0 0 1.664-.89l.812-1.22A2 2 0 0 1 10.07 4h3.86a2 2 0 0 1 1.664.89l.812 1.22A2 2 0 0 0 18.07 7H19a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"
            />
            <circle cx="12" cy="13" r="3" stroke="currentColor" stroke-width="1.8" />
          </svg>
          <span class="hidden sm:inline text-xs font-medium">Photo</span>
          <input
            (change)="fileUbloaded($event)"
            id="dropzone-file"
            type="file"
            accept="image/*"
            class="hidden"
          />
        </label>

        <!-- Emoji button -->
        <div class="relative">
          <button
            type="button"
            (click)="toggleEmojiPicker()"
            class="flex items-center gap-1.5 px-2.5 py-2 sm:px-3 rounded-xl text-gray-500 hover:text-yellow-500 hover:bg-yellow-50 transition-all group cursor-pointer"
            title="Add emoji"
          >
            <svg
              class="w-5 h-5 transition-transform group-hover:scale-110"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8" />
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.8"
                d="M8 14s1.5 2 4 2 4-2 4-2"
              />
              <circle cx="9" cy="10" r="1" fill="currentColor" />
              <circle cx="15" cy="10" r="1" fill="currentColor" />
            </svg>
            <span class="hidden sm:inline text-xs font-medium">Feeling</span>
          </button>

          <!-- Emoji Picker — opens DOWNWARD -->
          @if (showEmojiPicker) {
            <div
              class="absolute top-full left-0 mt-2 z-50 bg-white border border-gray-200 rounded-2xl shadow-2xl p-3 w-65 sm:w-72"
            >
              <div
                class="absolute -top-1.75 left-4 w-3 h-3 bg-white border-l border-t border-gray-200 rotate-45"
              ></div>
              <p class="text-2xs font-semibold text-gray-400 uppercase tracking-widest mb-2 px-1">
                Emoji
              </p>
              <div class="grid grid-cols-8 gap-5 max-h-44 overflow-y-auto">
                @for (emoji of emojis; track emoji) {
                  <button
                    type="button"
                    (click)="insertEmoji(emoji)"
                    class="text-lg sm:text-xl p-1 rounded-lg hover:bg-gray-100 active:scale-90 transition-all cursor-pointer leading-none"
                  >
                    {{ emoji }}
                  </button>
                }
              </div>
            </div>
          }
        </div>
      </div>

      <!-- Post Button -->
      <button
        type="submit"
        [disabled]="!creatPostContent.value && !previewUrl()"
        class="cursor-pointer flex items-center gap-1.5 bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-300 active:scale-95 text-white font-semibold text-xs sm:text-sm px-4 sm:px-5 py-2 sm:py-2.5 rounded-xl transition-all focus:outline-none focus:ring-4 focus:ring-indigo-300 shadow-md shadow-indigo-200 disabled:cursor-not-allowed"
      >
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24">
          <path
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5"
          />
        </svg>
        <span>Post</span>
      </button>
    </div>
  </form>
</section>
